version: '3.8'

services:
  sana-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sana-clinica-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Volumen para la aplicación (con hot-reload en desarrollo)
      - ./public:/var/www/sana-clinica:ro
      # Volumen para configuración de Nginx
      - ./nginx/sana.conf:/etc/nginx/sites-available/default:ro
      # Volumen para certificados SSL (cuando lo tengas)
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - TZ=America/Bogota
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sana-network

networks:
  sana-network:
    driver: bridge
