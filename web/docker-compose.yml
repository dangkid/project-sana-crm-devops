services:
  sanasalud-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sanasalud-web
    # ✅ NO EXPONER PUERTOS AL HOST - El NPM accede vía red Docker interna
    expose:
      - "80"
    volumes:
      - ./public:/var/www/sanasalud:ro
      - ./nginx/sanasalud.conf:/etc/nginx/sites-available/default:ro
    environment:
      - TZ=America/Bogota
      - VIRTUAL_HOST=sanasalud.com,www.sanasalud.com
      - LETSENCRYPT_HOST=sanasalud.com,www.sanasalud.com
      - LETSENCRYPT_EMAIL=contacto@sanasalud.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - sanasalud-network
      - nginx_default  # ✅ Red del Proxy Manager (INTERNA)

networks:
  sanasalud-network:
    driver: bridge
  nginx_default:     # ✅ Red externa del NPM
    external: true
    name: nginx_default
