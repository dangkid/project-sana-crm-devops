# Configuración Nginx para SANASALUD - Centro Terapéutico Integral
# Optimizada para rendimiento, seguridad y SEO

# Redireccionamiento HTTP a HTTPS (descomenta cuando tengas certificados SSL)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name sanasalud.online www.sanasalud.online;
#     return 301 https://$server_name$request_uri;
# }

# Servidor principal
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Configuración de servidor (actualiza con tu dominio real)
    server_name _;
    # server_name sanasalud.online www.sanasalud.online;

    # Raíz de la aplicación
    root /var/www/sanasalud;
    index index.html;

    # ========== SEGURIDAD ==========

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "location=(), microphone=(), camera=(), geolocation=()" always;

    # Content Security Policy (CSP)
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com https://*.chatwoot.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.chatwoot.com; frame-src 'self' https://*.chatwoot.com;" always;

    # Desactivar información del servidor
    server_tokens off;

    # ========== COMPRESIÓN ==========

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Brotli compression (si está disponible)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # ========== CACHING ==========

    # Cache de archivos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache de archivos de fuentes
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # Cache para archivos HTML
    location ~* \.html?$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ========== RUTAS ==========

    # Servir index.html para rutas raíz
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Prevenir acceso a archivos de configuración
    location ~ ^/(config|\.env|web\.config|web\.config~)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========== LOGGING ==========

    # Logs con formato personalizado
    access_log /var/log/nginx/sana-access.log combined buffer=32k;
    error_log /var/log/nginx/sana-error.log warn;

    # ========== PERFORMANCE ==========

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # Buffer sizes
    client_body_buffer_size 128k;
    client_max_body_size 128m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # TCP settings
    tcp_nopush on;
    tcp_nodelay on;

    # ========== SEO ==========

    # Sitemap
    location /sitemap.xml {
        try_files $uri =404;
    }

    # robots.txt
    location /robots.txt {
        try_files $uri =404;
    }

    # ========== CUSTOM ERROR PAGES ==========

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # ========== MÉTRICAS Y MONITOREO ==========

    # Endpoint para health checks
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;    # Docker network
        deny all;
    }
}

